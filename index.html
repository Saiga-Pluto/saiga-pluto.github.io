      <h1>UNIDOL Benefit Dispatch Console</h1>
      <p>UNIDOL Benefit Dispatch Console は、CSV / Excelの送信リストを読み込み、デジタル特典メールのプレビュー、送信対象の選択、GoogleログインによるGmail送信を行うWebアプリです。</p>
      <p>ユーザーが明示的に選択し、送信確認した宛先にのみメールを送信します。アップロードされたCSV / Excelファイル、メール本文、Googleアクセストークンはサーバーに保存しません。</p>
